# Multi-site VPS compose: один nginx-фронт, два независимых сайта (premium-design + febcode).
# Образы тянутся из GHCR — исходники приложений на VPS не клонируются.
# См. deploy/README.md и docs/operations/MULTISITE_VPS_DEPLOY_RU.md.

services:
  premium-design:
    image: ${PREMIUM_DESIGN_IMAGE}
    container_name: premium-design
    restart: unless-stopped
    env_file:
      - ./secrets/premium-design.env
    expose:
      - "3000"
    networks:
      - web
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  febcode:
    image: ${FEBCODE_IMAGE}
    container_name: febcode
    restart: unless-stopped
    env_file:
      - ./secrets/febcode.env
    expose:
      - "3000"
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - premium-design
      - febcode
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./letsencrypt:/etc/letsencrypt:ro
      - ./acme-webroot:/var/www/certbot:ro
    networks:
      - web

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: "no"
    volumes:
      - ./letsencrypt:/etc/letsencrypt
      - ./acme-webroot:/var/www/certbot
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet
          sleep 12h & wait $${!}
        done
    profiles:
      - tls

networks:
  web:
    driver: bridge
