# premium-design.pro → upstream Next.js (сервис Docker `premium-design`).
# Канонический origin отдаёт сайт; домены синхронизированы с SITE_OPERATOR.publicOrigin.

upstream premium_design_upstream {
    server premium-design:3000;
    keepalive 16;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name premium-design.pro www.premium-design.pro;

    ssl_certificate     /etc/letsencrypt/live/premium-design.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/premium-design.pro/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/premium-design.pro/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Канонический www → апекс.
    if ($host = www.premium-design.pro) {
        return 301 https://premium-design.pro$request_uri;
    }

    location / {
        proxy_pass http://premium_design_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # Иммутабельные ассеты Next.js (хеши в имени) — длинный кеш.
    location /_next/static/ {
        proxy_pass http://premium_design_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
