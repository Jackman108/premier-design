# HTTP-only конфиг для локальной dev-проверки продовой схемы роутинга.
upstream febcode_upstream {
    server febcode:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name febcode.pro www.febcode.pro;

    if ($host = www.febcode.pro) {
        return 301 http://febcode.pro$request_uri;
    }

    location / {
        proxy_pass http://febcode_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}
