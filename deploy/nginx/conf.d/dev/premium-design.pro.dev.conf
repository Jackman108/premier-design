# HTTP-only конфиг для локальной dev-проверки продовой схемы роутинга.
upstream premium_design_upstream {
    server premium-design:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name premium-design.pro www.premium-design.pro;

    if ($host = www.premium-design.pro) {
        return 301 http://premium-design.pro$request_uri;
    }

    location / {
        proxy_pass http://premium_design_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}
