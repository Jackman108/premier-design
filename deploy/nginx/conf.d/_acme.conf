# HTTP-redirect и общий ACME-эндпоинт для certbot (/.well-known/acme-challenge).
# Применяется ко всем доменам, обслуживаемым этим nginx.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
