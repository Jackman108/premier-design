<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Локальный стек — Premium Design + FEB Code</title>
	<style>
		:root {
			font-family: system-ui, Segoe UI, Roboto, sans-serif;
			line-height: 1.45;
			color: #1a1a1a;
			background: #f4f4f5;
		}
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 1.5rem;
		}
		main {
			max-width: 28rem;
			width: 100%;
			background: #fff;
			border-radius: 12px;
			box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
			padding: 1.75rem 1.5rem;
		}
		h1 {
			font-size: 1.125rem;
			font-weight: 600;
			margin: 0 0 0.75rem;
		}
		p.hint {
			font-size: 0.8125rem;
			color: #52525b;
			margin: 0 0 1.25rem;
		}
		ul {
			list-style: none;
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			gap: 0.75rem;
		}
		a.btn {
			display: block;
			text-align: center;
			text-decoration: none;
			font-weight: 500;
			padding: 0.65rem 1rem;
			border-radius: 8px;
			border: 1px solid #e4e4e7;
			background: #fafafa;
			color: #18181b;
			transition: background 0.15s ease, border-color 0.15s ease;
		}
		a.btn:hover,
		a.btn:focus-visible {
			background: #f4f4f5;
			border-color: #d4d4d8;
			outline: none;
		}
		a.btn:focus-visible {
			box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.35);
		}
		a.site-pd { border-left: 4px solid #2563eb; }
		a.site-feb { border-left: 4px solid #059669; }
	</style>
</head>
<body>
	<main>
		<h1>Локальный multi-site (Docker)</h1>
		<p class="hint">
			В <code>hosts</code> должно быть:
			<code>127.0.0.1 premium-design.pro febcode.pro</code>
		</p>
		<nav aria-label="Сайты на порту 8080">
			<ul>
				<li>
					<a class="btn site-pd" href="http://premium-design.pro:8080/">Premium Design</a>
				</li>
				<li>
					<a class="btn site-feb" href="http://febcode.pro:8080/">FEB Code</a>
				</li>
			</ul>
		</nav>
	</main>
</body>
</html>
