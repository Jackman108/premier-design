# Выкладка на **свой** VPS: только `docker compose pull` + `up` в каталоге infra-репозитория lendings-vps-infra
# (корень клона: docker-compose.yml). Исходники и сборка в образ — в GHCR (ghcr-premium-design.yml), не в этом job.
# Деплой **на Vercel** здесь не выполняется: сайт в Vercel — через Git-интеграцию в панели Vercel.
# См. docs/guides/DEPLOY_VERCEL_AND_VPS_RU.md

name: Deploy premium-design to VPS (SSH, docker compose pull)

on:
  workflow_dispatch:
  # Автодеплой на VPS (после зелёного master и настроенного server-side deploy):
  # push:
  #   branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Preflight — TCP до SSH-порта
        shell: bash
        env:
          H: ${{ secrets.HOST }}
          P: ${{ secrets.PORT }}
        run: |
          set -euo pipefail
          PORT="${P:-22}"
          if [[ -z "${H// }" ]]; then
            echo "::error::Секрет HOST пустой. Укажите IP или домен **VPS** (сервис SSH), куда клонирован **`lendings-vps-infra`**, — не URL сайта и не vercel.app. См. docs/guides/DEPLOY_VERCEL_AND_VPS_RU.md"
            exit 1
          fi
          if [[ "$H" == *"://"* ]] || [[ "$H" == *"/"* ]] || [[ "$H" == *" "* ]]; then
            echo "::error::HOST='…' похож на URL. Нужно только `203.0.113.10` или `server.example.com` — без https://."
            exit 1
          fi
          if ! timeout 15 bash -c "exec 3<>/dev/tcp/${H}/${PORT}"; then
            echo "::error::Нет TCP с runner до ${H}:${PORT}. Проверьте HOST/PORT и фаирвол. Это **не** подключение к Vercel."
            exit 1
          fi
          echo "OK: TCP ${H}:${PORT}"

      - name: Preflight — SSH-ключ и passphrase
        shell: bash
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PASS: ${{ secrets.SSH_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/gh_deploy_key
          chmod 600 ~/.ssh/gh_deploy_key
          if ssh-keygen -yf ~/.ssh/gh_deploy_key -P "" &>/dev/null; then
            echo "OK: приватный ключ без passphrase."
          elif [[ -n "${PASS}" ]] && ssh-keygen -yf ~/.ssh/gh_deploy_key -P "${PASS}" &>/dev/null; then
            echo "OK: passphrase подходит."
          else
            echo "::error::Не удалось расшифровать SSH_PRIVATE_KEY. См. docs/guides/DEPLOY_SSH_GITHUB_ACTIONS_RU.md"
            exit 1
          fi
          rm -f ~/.ssh/gh_deploy_key

      - name: Preflight — путь к deploy на сервере
        shell: bash
        env:
          D: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          if [[ -z "${D// }" ]]; then
            echo "::error::Задайте репозиторный секрет VPS_DEPLOY_PATH — **абсолютный** путь к **корню клона lendings-vps-infra** на VPS (где docker-compose.yml и nginx/), например /srv/lendings-vps-infra."
            exit 1
          fi
          echo "OK: VPS_DEPLOY_PATH задан (значение не печатаем)."

      - name: Удалённо — pull образа и перезапуск
        uses: appleboy/ssh-action@v1.2.0
        env:
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_USER: ${{ secrets.GHCR_USER }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.PORT }}
          timeout: 5m
          command_timeout: 30m
          envs: VPS_DEPLOY_PATH,GHCR_PULL_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd "$VPS_DEPLOY_PATH"
            if [ -n "${GHCR_PULL_TOKEN:-}" ] && [ -n "${GHCR_USER:-}" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            elif [ -n "${GHCR_PULL_TOKEN:-}" ] || [ -n "${GHCR_USER:-}" ]; then
              echo "Задайте оба секрета GHCR_USER и GHCR_PULL_TOKEN (или оставьте оба пустыми для public-образа)" >&2
              exit 1
            fi
            docker compose pull premium-design
            docker compose up -d premium-design nginx
            echo "OK: premium-design и nginx перезапущены."
