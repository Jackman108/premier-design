name: Deploy to Local Server

# Секреты: HOST, USERNAME, SSH_PRIVATE_KEY, PORT (часто 22), при шифровании ключа — SSH_KEY_PASSPHRASE (точный пароль от ключа).
# Ключ в SSH_PRIVATE_KEY должен быть многострочным (как в файле), с строками BEGIN/END.
#
# Сейчас деплой на VPS только вручную (пока продакшен на Vercel). После готовности своего сервера —
# раскомментируйте блок push ниже и проверьте секреты HOST/USERNAME/PORT.

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Preflight — TCP до SSH-порта
        shell: bash
        env:
          H: ${{ secrets.HOST }}
          P: ${{ secrets.PORT }}
        run: |
          set -euo pipefail
          PORT="${P:-22}"
          if [[ -z "${H// }" ]]; then
            echo "::error::Секрет HOST пустой. Укажите IP или домен **вашего VPS** (сервера с Docker), куда заходите по SSH — не URL сайта и не vercel.app."
            exit 1
          fi
          if [[ "$H" == *"://"* ]] || [[ "$H" == *"/"* ]] || [[ "$H" == *" "* ]]; then
            echo "::error::HOST='…' похож на URL или содержит пробелы. Нужно только имя или IP, например \`203.0.113.10\` или \`server.example.com\` — без https:// и без пути. Деплой на Vercel этим workflow не выполняется (см. docs/guides/DEPLOY_SSH_GITHUB_ACTIONS_RU.md)."
            exit 1
          fi
          if ! timeout 15 bash -c "exec 3<>/dev/tcp/${H}/${PORT}"; then
            echo "::error::Нет TCP с GitHub runner до ${H}:${PORT}. Этот job подключается к **вашему серверу по SSH**, не к Vercel. Откройте порт SSH из интернета (или self-hosted runner в вашей сети), проверьте HOST/PORT и security group."
            exit 1
          fi
          echo "OK: TCP ${H}:${PORT}"

      - name: Preflight — ключ и passphrase
        shell: bash
        env:
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PASS: ${{ secrets.SSH_KEY_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/gh_deploy_key
          chmod 600 ~/.ssh/gh_deploy_key
          if ssh-keygen -yf ~/.ssh/gh_deploy_key -P "" &>/dev/null; then
            echo "OK: приватный ключ без passphrase."
          elif [[ -n "${PASS}" ]] && ssh-keygen -yf ~/.ssh/gh_deploy_key -P "${PASS}" &>/dev/null; then
            echo "OK: ключ с passphrase, секрет SSH_KEY_PASSPHRASE подходит."
          else
            echo "::error::Не удалось расшифровать SSH_PRIVATE_KEY. Если ключ создавался с паролем — добавьте репозиторный секрет SSH_KEY_PASSPHRASE (точно как при ssh-add). Иначе сгенерируйте ключ только для CI без пароля: ssh-keygen -t ed25519 -N \"\" -f deploy_ci && cat deploy_ci (в секрет SSH_PRIVATE_KEY), публичную часть — в authorized_keys на сервере."
            exit 1
          fi
          rm -f ~/.ssh/gh_deploy_key

      - name: Pack repository for deploy
        run: |
          # Архив вне $GITHUB_WORKSPACE — иначе tar читает растущий deploy.tar.gz и падает с "file changed as we read it"
          tar -czf /tmp/deploy.tar.gz \
            --exclude='./.git' \
            --exclude='./premier-design/node_modules' \
            --exclude='./premier-design/.next' \
            --exclude='./premier-design/coverage' \
            --exclude='./premier-design/storybook-static' \
            .

      - name: Copy bundle to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.PORT }}
          source: /tmp/deploy.tar.gz
          target: /var/www/pd-app
          timeout: 5m
          command_timeout: 30m

      - name: Extract and restart stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.PORT }}
          timeout: 5m
          command_timeout: 30m
          script: |
            set -e
            mkdir -p /var/www/pd-app
            cd /var/www/pd-app
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz
            docker-compose down
            docker-compose up -d --build
