name: CI Quality Gates

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: premier-design

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: premier-design/.nvmrc
          cache: yarn
          cache-dependency-path: premier-design/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: yarn lint

      - name: Check architecture boundaries
        run: yarn check:architecture

      - name: Check architecture allowlist reduction plan
        run: yarn check:architecture:progress

      - name: Report architecture allowlist debt
        run: yarn report:architecture-allowlist

      - name: Check UI purity
        run: yarn check:ui-purity

      - name: Check style regressions
        run: yarn check:regressions

      - name: Check noise artifacts
        run: yarn check:noise

      - name: Check feature structure
        run: yarn check:feature-structure

      - name: Test with coverage
        run: yarn test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: premier-design/coverage

      - name: Build
        run: yarn build

      - name: Install Playwright Chromium for perf scripts
        run: yarn test:e2e:install

      - name: Performance budget gate (Lighthouse + Initial JS)
        env:
          PERF_BUDGET_SCORE: '0.90'
          PERF_BUDGET_LCP_MS: '2500'
          PERF_BUDGET_CLS: '0.10'
          PERF_BUDGET_INP_MS: '200'
          PERF_BUDGET_TBT_MS: '300'
          INITIAL_JS_BUDGET_KB: '750'
        run: yarn check:perf:ci

      - name: Feedback API SLO gate (if telemetry exists)
        env:
          FEEDBACK_SLO_ROLLING_HOURS: '24'
          FEEDBACK_SLO_MIN_SAMPLES: '20'
          FEEDBACK_SLO_P95_MS: '1500'
          FEEDBACK_SLO_ERROR_RATE_PCT: '5'
          FEEDBACK_SLO_TIMEOUT_RATE_PCT: '1'
        run: yarn check:slo:feedback

      - name: Audit dependencies (Yarn)
        working-directory: premier-design
        run: yarn audit --level critical

  storybook:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: premier-design

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: premier-design/.nvmrc
          cache: yarn
          cache-dependency-path: premier-design/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Build Storybook
        run: yarn build-storybook

      - name: Upload Storybook static
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: premier-design/storybook-static

  e2e-smoke:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: premier-design

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: premier-design/.nvmrc
          cache: yarn
          cache-dependency-path: premier-design/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browser
        run: yarn test:e2e:install

      - name: Build app for production e2e server
        run: yarn build

      - name: Run e2e core smoke tests
        run: yarn test:e2e
