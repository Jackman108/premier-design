name: CI Quality Gates

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  quality:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: premier-design

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: premier-design/.nvmrc
          cache: yarn
          cache-dependency-path: premier-design/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: yarn lint

      - name: Test with coverage
        run: yarn test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: premier-design/coverage

      - name: Build
        run: yarn build

      - name: Audit production dependencies
        shell: bash
        working-directory: premier-design
        run: |
          set -euo pipefail
          if [[ ! -f package-lock.json ]]; then
            echo "::error::package-lock.json missing — run yarn sync:npm-lock and commit"
            exit 1
          fi
          npm audit --omit=dev --audit-level=critical

  storybook:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: premier-design

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: premier-design/.nvmrc
          cache: yarn
          cache-dependency-path: premier-design/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Build Storybook
        run: yarn build-storybook

      - name: Upload Storybook static
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: premier-design/storybook-static

  e2e-smoke:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: premier-design

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: premier-design/.nvmrc
          cache: yarn
          cache-dependency-path: premier-design/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browser
        run: yarn test:e2e:install

      - name: Run e2e smoke tests
        run: yarn test:e2e
