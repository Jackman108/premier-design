# Сборка `premier-design/Dockerfile.prod` и публикация в GHCR — основа для VPS (deploy/docker-compose.yml).
# Vercel этот workflow не трогает: сайт на Vercel собирает их облако по пушу (см. docs/guides/DEPLOY_VERCEL_AND_VPS_RU.md).

name: Build & push premium-design image (GHCR)

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'premier-design/**'
      - '.github/workflows/ghcr-premium-design.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  IMAGE_NAME: premium-design

permissions:
  contents: read
  packages: write

jobs:
  push-ghcr:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lowercase image owner (GHCR)
        id: image
        run: |
          o="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${o}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "Image: ghcr.io/${o}/${{ env.IMAGE_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./premier-design
          file: ./premier-design/Dockerfile.prod
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
